{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 shadow-sm border border-[#e8e9ed]">
        <div class="text-center">
            <p style="font-family: 'DM Serif Text', serif;" class="text-2xl text-[#607196] mb-1">Timetify</p>
            <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Reset your password</h2>
            <p class="mt-2 text-sm text-gray-500">Enter your email and we'll send you a reset link</p>
        </div>

        <form method="post" class="mt-8 space-y-5">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1.5 ml-1">
                        Email address
                    </label>
                    <input
                        type="email"
                        name="email"
                        id="id_email"
                        autocomplete="email"
                        required
                        class="w-full px-4 py-3 border border-[#e8e9ed] bg-white outline-none transition-all duration-200 placeholder:text-gray-400 text-gray-900 text-sm"
                        style="focus-visible:outline:none"
                        placeholder="you@university.edu"
                        onfocus="this.style.borderColor='#607196'; this.style.boxShadow='0 0 0 3px rgba(96,113,150,0.15)'"
                        onblur="this.style.borderColor='#e8e9ed'; this.style.boxShadow='none'"
                    />
                    {% if form.email.errors %}
                    <div class="mt-1.5 flex items-start gap-1.5">
                        <svg class="w-4 h-4 text-red-500 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <p class="text-xs font-medium text-red-600">{{ form.email.errors.0 }}</p>
                    </div>
                    {% endif %}
                </div>
            </div>

            <div>
                <button
                    type="submit"
                    class="w-full flex justify-center py-4 px-4 border border-transparent shadow-lg text-sm font-bold text-white bg-[#607196] hover:bg-[#607196]/80 focus:outline-none focus:ring-4 focus:ring-[#607196]/20 transition-all duration-200 transform hover:-translate-y-0.5 active:translate-y-0"
                >
                    Send Reset Email
                </button>
            </div>

            <p class="text-center text-sm text-gray-500">
                Remember your password?
                <a href="{{ frontend_url }}/login" class="font-semibold text-[#607196] hover:text-[#607196]/80 transition-colors">
                    Back to Login
                </a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
