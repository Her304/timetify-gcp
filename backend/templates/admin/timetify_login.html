{% extends "admin/login.html" %}
{% load i18n static %}

{% block extrastyle %}
{{ block.super }}
<style>
  body.login { background:#f5f5f3 !important; }
  body.login #header { display:none; }
  body.login #container { padding:0; }
  body.login .main { padding:0; }
  body.login #content { padding:48px 16px; }
  body.login #content-main {
    max-width:420px;
    margin:0 auto;
    background:#ffffff;
    border:1px solid #e8e9ed;
    box-shadow:0 1px 2px rgba(0,0,0,0.04);
    padding:40px;
  }
  body.login .submit-row { padding:0; margin-top:20px; background:transparent; border:0; }
  body.login .submit-row input {
    width:100%;
    background:#607196;
    color:#fff;
    font-weight:700;
    padding:14px 16px;
    border:0;
    border-radius:0;
    font-size:14px;
    cursor:pointer;
    transition:background 150ms ease;
  }
  body.login .submit-row input:hover { background:rgba(96,113,150,0.85); }
  body.login form .form-row { padding:0; border:0; margin-bottom:16px; }
  body.login form input[type="text"],
  body.login form input[type="password"] {
    width:100%;
    padding:12px 14px;
    border:1px solid #e8e9ed;
    border-radius:0;
    font-size:14px;
    font-family:'Figtree', sans-serif;
    background:#fff;
    color:#111827;
  }
  body.login form input[type="text"]:focus,
  body.login form input[type="password"]:focus {
    outline:none;
    border-color:#607196;
    box-shadow:0 0 0 3px rgba(96,113,150,0.15);
  }
  body.login form label {
    display:block;
    font-size:11px;
    font-weight:600;
    color:#374151;
    text-transform:uppercase;
    letter-spacing:0.05em;
    margin-bottom:6px;
  }
  body.login .password-reset-link { text-align:center; margin-top:18px; font-size:13px; }
  body.login .password-reset-link a { color:#607196; font-weight:600; text-decoration:none; }
  body.login .password-reset-link a:hover { text-decoration:underline; }
  .timetify-login-header {
    text-align:center;
    margin-bottom:28px;
  }
  .timetify-login-header .wordmark {
    font-family:'DM Serif Text', serif;
    font-size:28px;
    color:#607196;
    line-height:1;
    margin-bottom:6px;
  }
  .timetify-login-header .subtitle {
    font-family:'Figtree', sans-serif;
    font-size:13px;
    color:#6b7280;
  }
</style>
{% endblock %}

{% block content_title %}
<div class="timetify-login-header">
  <div class="wordmark">Timetify</div>
  <div class="subtitle">Sign in to the admin portal</div>
</div>
{% endblock %}
